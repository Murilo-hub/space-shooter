<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Shooter</title>

  <!--
    ══════════════════════════════════════════════════════════════════
    BLOCO 1 – ESTILOS GLOBAIS
    Define o visual base: fundo preto, fonte pixelada via Google Fonts,
    e os estilos de cada "tela" do jogo (menu, HUD, overlays).
    ══════════════════════════════════════════════════════════════════
  -->
  <style>
    /* Importa fonte com estilo arcade/retro */
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    /* Reset geral e fundo negro do espaço */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      user-select: none; /* evita seleção acidental de texto */
    }

    /* Container principal que agrupa canvas e overlays */
    #game-container {
      position: relative;
      width: 600px;
      height: 700px;
    }

    /* O canvas onde tudo é desenhado (estrelas, naves, tiros) */
    canvas {
      display: block;
      border: 1px solid #1a1a2e;
    }

    /* ── MENU ── */
    #menu {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      background: rgba(0,0,0,0.85);
      z-index: 10;
    }
    #menu h1 {
      font-size: 26px;
      color: #00ff88;
      text-shadow: 0 0 20px #00ff88;
      letter-spacing: 4px;
      animation: pulse 2s ease-in-out infinite;
    }
    #menu .subtitle {
      font-size: 9px;
      color: #aaa;
      letter-spacing: 3px;
    }
    #menu .record-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid #333;
      padding: 16px 28px;
      text-align: center;
    }
    #menu .record-label { font-size: 8px; color: #888; margin-bottom: 10px; }
    #menu .record-value { font-size: 20px; color: #ffd700; }
    #btn-play {
      background: transparent;
      border: 2px solid #00ff88;
      color: #00ff88;
      font-family: inherit;
      font-size: 14px;
      padding: 14px 36px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: background 0.2s, color 0.2s;
    }
    #btn-play:hover { background: #00ff88; color: #000; }
    #menu .controls-hint {
      font-size: 7px;
      color: #555;
      line-height: 2;
      text-align: center;
    }

    /* ── HUD (cabeçalho durante o jogo) ── */
    #hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: none; /* escondido até o jogo começar */
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: rgba(0,0,0,0.6);
      font-size: 8px;
      z-index: 5;
      pointer-events: none;
    }
    #hud .hud-lives { color: #ff4d4d; }
    #hud .hud-score { color: #fff; }
    #hud .hud-level { color: #00aaff; }

    /* ── OVERLAY DE CONFIRMAÇÃO (M = Menu) ── */
    #confirm-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 20;
    }
    #confirm-overlay p { font-size: 12px; color: #fff; text-align: center; line-height: 2; }
    .confirm-btns { display: flex; gap: 20px; }
    .confirm-btns button {
      font-family: inherit;
      font-size: 10px;
      padding: 12px 24px;
      cursor: pointer;
      border: 2px solid;
    }
    #btn-yes { border-color: #ff4d4d; color: #ff4d4d; background: transparent; }
    #btn-yes:hover { background: #ff4d4d; color: #000; }
    #btn-no  { border-color: #00ff88; color: #00ff88; background: transparent; }
    #btn-no:hover  { background: #00ff88; color: #000; }

    /* ── OVERLAY DE GAME OVER / VITÓRIA ── */
    #gameover-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 20;
    }
    #gameover-overlay h2 { font-size: 22px; }
    #gameover-overlay .go-score { font-size: 10px; color: #aaa; }
    #gameover-overlay .go-score span { color: #ffd700; }
    .go-btns { display: flex; gap: 16px; margin-top: 8px; }
    .go-btns button {
      font-family: inherit;
      font-size: 9px;
      padding: 12px 20px;
      cursor: pointer;
      border: 2px solid;
      background: transparent;
    }
    #btn-restart { border-color: #00ff88; color: #00ff88; }
    #btn-restart:hover { background: #00ff88; color: #000; }
    #btn-gomenu  { border-color: #888; color: #888; }
    #btn-gomenu:hover  { background: #888; color: #000; }

    /* ── OVERLAY DE TRANSIÇÃO DE NÍVEL ── */
    #level-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 15;
      pointer-events: none;
    }
    #level-overlay h2 { font-size: 18px; color: #00aaff; }
    #level-overlay p  { font-size: 9px; color: #aaa; }

    /* ── ANIMAÇÕES ── */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.6; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }
    #level-overlay h2, #gameover-overlay h2 {
      animation: fadeIn 0.3s ease;
    }
  </style>
</head>
<body>

<!--
  ══════════════════════════════════════════════════════════════════
  BLOCO 2 – ESTRUTURA HTML DAS TELAS
  Cada "tela" é uma div posicionada sobre o canvas.
  A visibilidade de cada uma é controlada via JavaScript.
  ══════════════════════════════════════════════════════════════════
-->
<div id="game-container">

  <!-- Canvas principal onde o jogo é renderizado frame a frame -->
  <canvas id="gameCanvas" width="600" height="700"></canvas>

  <!-- TELA: Menu inicial -->
  <div id="menu">
    <h1>SPACE SHOOTER</h1>
    <p class="subtitle">► DEFENDA A GALÁXIA ◄</p>
    <div class="record-box">
      <p class="record-label">▲ RECORDE ▲</p>
      <p class="record-value" id="menu-record">0</p>
    </div>
    <button id="btn-play">▶ JOGAR</button>
    <div class="controls-hint">
      WASD – MOVER &nbsp;|&nbsp; ESPAÇO – ATIRAR<br>
      M – VOLTAR AO MENU
    </div>
  </div>

  <!-- HUD: pontuação, vidas e nível durante o jogo -->
  <div id="hud">
    <span class="hud-lives" id="hud-lives">♥ ♥ ♥ ♥ ♥</span>
    <span class="hud-score" id="hud-score">PONTOS: 0</span>
    <span class="hud-level" id="hud-level">NÍVEL: 1</span>
  </div>

  <!-- OVERLAY: Confirmação de retorno ao menu -->
  <div id="confirm-overlay">
    <p>Deseja realmente<br>voltar ao MENU?<br><br>
    <span style="font-size:8px;color:#888">O progresso atual será perdido.</span></p>
    <div class="confirm-btns">
      <button id="btn-yes">SIM</button>
      <button id="btn-no">NÃO</button>
    </div>
  </div>

  <!-- OVERLAY: Transição entre níveis -->
  <div id="level-overlay">
    <h2 id="level-title">NÍVEL 2</h2>
    <p id="level-sub">Prepare-se!</p>
  </div>

  <!-- OVERLAY: Game Over / Vitória -->
  <div id="gameover-overlay">
    <h2 id="go-title" style="color:#ff4d4d">GAME OVER</h2>
    <p class="go-score">PONTUAÇÃO: <span id="go-score">0</span></p>
    <p class="go-score">RECORDE:   <span id="go-record">0</span></p>
    <div class="go-btns">
      <button id="btn-restart">↺ JOGAR NOVAMENTE</button>
      <button id="btn-gomenu">⌂ MENU</button>
    </div>
  </div>

</div><!-- /#game-container -->

<!--
  ══════════════════════════════════════════════════════════════════
  BLOCO 3 – JAVASCRIPT: MOTOR DO JOGO
  Todo o comportamento do jogo está aqui, dividido em seções
  claramente comentadas.
  ══════════════════════════════════════════════════════════════════
-->
<script>
"use strict";

/* ─────────────────────────────────────────────────────────────────
   SEÇÃO A – REFERÊNCIAS AO DOM E AO CANVAS
   Obtemos os elementos HTML que serão manipulados durante o jogo.
   O contexto 2D (ctx) é o "pincel" usado para desenhar no canvas.
───────────────────────────────────────────────────────────────── */
const canvas  = document.getElementById('gameCanvas');
const ctx     = canvas.getContext('2d');

const menuEl         = document.getElementById('menu');
const hudEl          = document.getElementById('hud');
const confirmEl      = document.getElementById('confirm-overlay');
const levelEl        = document.getElementById('level-overlay');
const gameoverEl     = document.getElementById('gameover-overlay');

const menuRecordEl   = document.getElementById('menu-record');
const hudLivesEl     = document.getElementById('hud-lives');
const hudScoreEl     = document.getElementById('hud-score');
const hudLevelEl     = document.getElementById('hud-level');
const goTitleEl      = document.getElementById('go-title');
const goScoreEl      = document.getElementById('go-score');
const goRecordEl     = document.getElementById('go-record');
const levelTitleEl   = document.getElementById('level-title');
const levelSubEl     = document.getElementById('level-sub');

/* ─────────────────────────────────────────────────────────────────
   SEÇÃO B – CONSTANTES DO JOGO
   Valores fixos que definem as regras e limites do jogo.
───────────────────────────────────────────────────────────────── */
const MAX_LEVEL      = 15;    // Quantidade máxima de níveis
const MAX_LIVES      = 5;     // Vidas iniciais do jogador
const POINTS_PER_KILL= 100;   // Pontos por nave destruída
const SHOOT_COOLDOWN = 1000;  // Cooldown de tiro em ms (1 segundo)
const PLAYER_SPEED   = 4;     // Velocidade de movimento do player
const BULLET_SPEED   = 7;     // Velocidade dos tiros do player
const ENEMY_BULLET_SPEED = 3; // Velocidade dos tiros inimigos
const STAR_COUNT     = 120;   // Quantidade de estrelas no fundo

/* ─────────────────────────────────────────────────────────────────
   SEÇÃO C – VARIÁVEIS DE ESTADO
   Estado atual da partida: pontuação, nível, pausa, etc.
   São redefinidas a cada nova partida em startGame().
───────────────────────────────────────────────────────────────── */
let score       = 0;
let lives       = MAX_LIVES;
let level       = 1;
let gameRunning = false;
let paused      = false;       // pausa usada durante overlays de nível
let animFrameId = null;        // ID do requestAnimationFrame para poder cancelar
let lastTime    = 0;           // Timestamp do último frame (para delta time)

/* ─────────────────────────────────────────────────────────────────
   SEÇÃO D – RECORDE (localStorage)
   Persistimos o recorde entre sessões usando o armazenamento local
   do navegador. Se não houver nenhum registrado, começa em 0.
───────────────────────────────────────────────────────────────── */
function getRecord() {
  return parseInt(localStorage.getItem('spaceShooterRecord') || '0', 10);
}
function saveRecord(val) {
  if (val > getRecord()) localStorage.setItem('spaceShooterRecord', String(val));
}

/* ─────────────────────────────────────────────────────────────────
   SEÇÃO E – FUNDO ESTRELADO
   Geramos estrelas com posições, tamanhos e velocidades aleatórias.
   Elas se movem para baixo para simular o scroll do espaço.
───────────────────────────────────────────────────────────────── */
const stars = [];

function initStars() {
  stars.length = 0;
  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x:     Math.random() * canvas.width,
      y:     Math.random() * canvas.height,
      r:     Math.random() * 1.5 + 0.3,         // raio entre 0.3 e 1.8
      speed: Math.random() * 0.8 + 0.2,         // velocidade de queda
      alpha: Math.random() * 0.6 + 0.4           // opacidade (brilho)
    });
  }
}

function updateStars(dt) {
  // Move cada estrela para baixo; quando sai da tela reposiciona no topo
  for (const s of stars) {
    s.y += s.speed * dt * 0.06;
    if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
  }
}

function drawStars() {
  for (const s of stars) {
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1; // restaura opacidade padrão
}

/* ─────────────────────────────────────────────────────────────────
   SEÇÃO F – PLAYER
   Objeto do jogador: posição, tamanho, lógica de movimento,
   tiro (com cooldown) e renderização.
───────────────────────────────────────────────────────────────── */
const player = {
  x: 300, y: 620,       // posição inicial (centro-inferior)
  w: 28, h: 36,         // tamanho da nave
  lastShot: 0,          // timestamp do último tiro (para cooldown)
  invincible: false,    // true nos frames após tomar dano (pisca)
  invTimer: 0,          // timer de invencibilidade após levar dano
  visible: true         // controla a visibilidade durante o piscar
};

// Reinicia o player para o estado inicial
function resetPlayer() {
  player.x = canvas.width / 2;
  player.y = 620;
  player.lastShot = 0;
  player.invincible = false;
  player.invTimer = 0;
  player.visible = true;
}

// Atualiza a posição do player com base nas teclas pressionadas
function updatePlayer(dt) {
  const spd = PLAYER_SPEED;

  if (keys['KeyW'] || keys['ArrowUp'])    player.y -= spd;
  if (keys['KeyS'] || keys['ArrowDown'])  player.y += spd;
  if (keys['KeyA'] || keys['ArrowLeft'])  player.x -= spd;
  if (keys['KeyD'] || keys['ArrowRight']) player.x += spd;

  // Limita o player dentro dos limites do canvas
  player.x = Math.max(player.w / 2, Math.min(canvas.width  - player.w / 2, player.x));
  player.y = Math.max(player.h / 2, Math.min(canvas.height - player.h / 2, player.y));

  // Atualiza a invencibilidade temporária após tomar dano (efeito de piscar)
  if (player.invincible) {
    player.invTimer -= dt;
    // Alterna visibilidade a cada 100ms para criar o efeito de piscar
    player.visible = Math.floor(player.invTimer / 100) % 2 === 0;
    if (player.invTimer <= 0) {
      player.invincible = false;
      player.visible = true;
    }
  }
}

// Desenha a nave do player como um triângulo verde estilizado
function drawPlayer() {
  if (!player.visible) return; // não desenha durante o piscar

  const { x, y, w, h } = player;
  ctx.save();

  // Corpo principal: triângulo verde
  ctx.fillStyle = '#00ff88';
  ctx.shadowColor = '#00ff88';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.moveTo(x, y - h / 2);           // ponta do topo
  ctx.lineTo(x - w / 2, y + h / 2);  // base esquerda
  ctx.lineTo(x + w / 2, y + h / 2);  // base direita
  ctx.closePath();
  ctx.fill();

  // Detalhe central: cockpit mais escuro
  ctx.fillStyle = '#005533';
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.moveTo(x, y - h / 4);
  ctx.lineTo(x - w / 6, y + h / 4);
  ctx.lineTo(x + w / 6, y + h / 4);
  ctx.closePath();
  ctx.fill();

  // Asas laterais
  ctx.fillStyle = '#00cc66';
  ctx.beginPath();
  ctx.moveTo(x - w / 2, y + h / 2);
  ctx.lineTo(x - w * 0.85, y + h / 3);
  ctx.lineTo(x - w * 0.2, y);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x + w / 2, y + h / 2);
  ctx.lineTo(x + w * 0.85, y + h / 3);
  ctx.lineTo(x + w * 0.2, y);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

/* ─────────────────────────────────────────────────────────────────
   SEÇÃO G – TIROS DO PLAYER
   Array de tiros ativos do jogador. Cada tiro é um objeto {x,y}.
   A função playerShoot() respeita o cooldown de 1 segundo.
───────────────────────────────────────────────────────────────── */
const playerBullets = [];

function playerShoot(now) {
  // Bloqueia disparo se o cooldown ainda não passou
  if (now - player.lastShot < SHOOT_COOLDOWN) return;
  player.lastShot = now;
  playerBullets.push({ x: player.x, y: player.y - player.h / 2 });
}

function updatePlayerBullets(dt) {
  for (let i = playerBullets.length - 1; i >= 0; i--) {
    playerBullets[i].y -= BULLET_SPEED * dt * 0.06;
    // Remove tiros que saíram da tela pelo topo
    if (playerBullets[i].y < -10) playerBullets.splice(i, 1);
  }
}

function drawPlayerBullets() {
  ctx.save();
  ctx.fillStyle = '#00ffff';
  ctx.shadowColor = '#00ffff';
  ctx.shadowBlur = 8;
  for (const b of playerBullets) {
    ctx.fillRect(b.x - 2, b.y - 8, 4, 16); // tiro retangular "laser"
  }
  ctx.restore();
}

/* ─────────────────────────────────────────────────────────────────
   SEÇÃO H – INIMIGOS
   Array de inimigos ativos. A quantidade e velocidade aumentam
   conforme o nível. Os inimigos se movem em zigue-zague horizontal
   e descem gradualmente na tela.
───────────────────────────────────────────────────────────────── */
const enemies = [];

// Calcula quantos inimigos devem aparecer no nível atual
function enemyCountForLevel(lvl) {
  // Nível 1 = 3 inimigos, cresce 2 por nível até o máximo de 30
  return Math.min(3 + (lvl - 1) * 2, 30);
}

// Velocidade horizontal dos inimigos (aumenta com o nível)
function enemySpeedForLevel(lvl) {
  return 1 + (lvl - 1) * 0.2;
}

// Instancia os inimigos do nível atual em linhas organizadas
function spawnEnemies(lvl) {
  enemies.length = 0;
  const count = enemyCountForLevel(lvl);
  const cols  = Math.min(count, 6);               // máximo 6 por linha
  const rows  = Math.ceil(count / cols);
  const spd   = enemySpeedForLevel(lvl);
  const gapX  = canvas.width / (cols + 1);        // espaçamento horizontal

  let id = 0;
  for (let r = 0; r < rows; r++) {
    const rowCount = (r < rows - 1) ? cols : count - r * cols;
    const rowGapX  = canvas.width / (rowCount + 1);
    for (let c = 0; c < rowCount && id < count; c++, id++) {
      enemies.push({
        x:   rowGapX * (c + 1),
        y:   60 + r * 70,          // posição inicial (topo)
        w:   28, h: 22,
        dir: 1,                    // direção horizontal: 1=direita, -1=esquerda
        spd: spd,
        shootTimer: Math.random() * 3000 + 1000  // timer aleatório para atirar
      });
    }
  }
}

// Atualiza posição e lógica de tiro de cada inimigo
function updateEnemies(dt, now) {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];

    // Movimento horizontal com rebote nas bordas
    e.x += e.spd * e.dir * dt * 0.06;
    if (e.x + e.w / 2 > canvas.width || e.x - e.w / 2 < 0) {
      e.dir *= -1;     // inverte direção ao bater na borda
      e.y += 8;        // desce um pouco ao mudar de direção
    }

    // Se o inimigo chegar à área do player, o jogador perde imediatamente
    if (e.y + e.h / 2 > canvas.height - 60) {
      loseLife(now); // perde uma vida por invasão
      enemies.splice(i, 1);
      continue;
    }

    // Lógica de tiro dos inimigos: timer aleatório decrescente
    e.shootTimer -= dt;
    if (e.shootTimer <= 0) {
      enemyBullets.push({ x: e.x, y: e.y + e.h / 2 });
      // Redefine timer (fica mais rápido em níveis altos)
      const minT = Math.max(400, 2000 - level * 100);
      e.shootTimer = Math.random() * 2000 + minT;
    }
  }
}

// Desenha cada inimigo como uma nave triangular vermelha
function drawEnemies() {
  ctx.save();
  for (const e of enemies) {
    const { x, y, w, h } = e;
    ctx.fillStyle = '#ff3333';
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 10;

    // Corpo triangular invertido (ponta para baixo = "invasor")
    ctx.beginPath();
    ctx.moveTo(x, y + h / 2);          // ponta inferior
    ctx.lineTo(x - w / 2, y - h / 2); // topo esquerdo
    ctx.lineTo(x + w / 2, y - h / 2); // topo direito
    ctx.closePath();
    ctx.fill();

    // Detalhe: olho no centro
    ctx.fillStyle = '#ff9999';
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.arc(x, y - 2, 4, 0, Math.PI * 2);
    ctx.fill();

    // Asas superiores
    ctx.fillStyle = '#cc0000';
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.moveTo(x - w / 2, y - h / 2);
    ctx.lineTo(x - w * 0.8, y - h / 6);
    ctx.lineTo(x - w * 0.1, y);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x + w / 2, y - h / 2);
    ctx.lineTo(x + w * 0.8, y - h / 6);
    ctx.lineTo(x + w * 0.1, y);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

/* ─────────────────────────────────────────────────────────────────
   SEÇÃO I – TIROS DOS INIMIGOS
   Array de projéteis disparados pelos inimigos.
   Descem na tela e eliminam uma vida ao colidir com o player.
───────────────────────────────────────────────────────────────── */
const enemyBullets = [];

function updateEnemyBullets(dt, now) {
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.y += ENEMY_BULLET_SPEED * dt * 0.06;

    // Remove se sair da tela pelo fundo
    if (b.y > canvas.height + 10) {
      enemyBullets.splice(i, 1);
      continue;
    }

    // Detecção de colisão com o player (caixa de colisão simplificada)
    if (!player.invincible &&
        b.x > player.x - player.w / 2 &&
        b.x < player.x + player.w / 2 &&
        b.y > player.y - player.h / 2 &&
        b.y < player.y + player.h / 2) {
      enemyBullets.splice(i, 1);
      loseLife(now);
    }
  }
}

function drawEnemyBullets() {
  ctx.save();
  ctx.fillStyle = '#ff6600';
  ctx.shadowColor = '#ff4400';
  ctx.shadowBlur = 8;
  for (const b of enemyBullets) {
    ctx.fillRect(b.x - 2, b.y - 6, 4, 12);
  }
  ctx.restore();
}

/* ─────────────────────────────────────────────────────────────────
   SEÇÃO J – PARTÍCULAS DE EXPLOSÃO
   Quando um inimigo é destruído, criamos partículas que se expandem
   e desvanecem, simulando uma pequena explosão.
───────────────────────────────────────────────────────────────── */
const particles = [];

function spawnExplosion(x, y) {
  // Cria entre 8 e 12 partículas em direções aleatórias
  const count = Math.floor(Math.random() * 5) + 8;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 2.5 + 0.5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,            // vida em [0,1], reduzida por frame
      r: Math.random() * 3 + 1,
      color: ['#ff4400', '#ff8800', '#ffcc00', '#ff2200'][Math.floor(Math.random() * 4)]
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x    += p.vx * dt * 0.05;
    p.y    += p.vy * dt * 0.05;
    p.life -= 0.025 * dt * 0.06;  // desvanecer gradual
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  ctx.save();
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle   = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur  = 4;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

/* ─────────────────────────────────────────────────────────────────
   SEÇÃO K – DETECÇÃO DE COLISÃO (TIROS DO PLAYER vs INIMIGOS)
   Verifica se algum tiro do player atingiu algum inimigo.
   Colisão simples por raio (bounding circle).
───────────────────────────────────────────────────────────────── */
function checkBulletEnemyCollisions(now) {
  for (let bi = playerBullets.length - 1; bi >= 0; bi--) {
    const b = playerBullets[bi];
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      const e = enemies[ei];
      const dx = b.x - e.x;
      const dy = b.y - e.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < (e.w / 2 + 5)) {          // "5" = raio aproximado do tiro
        spawnExplosion(e.x, e.y);           // efeito visual de explosão
        enemies.splice(ei, 1);              // remove o inimigo
        playerBullets.splice(bi, 1);        // remove o tiro
        score += POINTS_PER_KILL;           // incrementa pontuação
        updateHUD();

        // Verifica se todos os inimigos do nível foram eliminados
        if (enemies.length === 0) {
          levelComplete(now);
        }
        break; // um tiro só pode atingir um inimigo
      }
    }
  }
}

/* ─────────────────────────────────────────────────────────────────
   SEÇÃO L – PERDA DE VIDA
   Chamada sempre que o player toma dano (tiro inimigo ou invasão).
   Ativa o efeito de invencibilidade temporária para evitar hit múltiplo.
───────────────────────────────────────────────────────────────── */
function loseLife(now) {
  lives--;
  updateHUD();

  if (lives <= 0) {
    endGame(false); // derrota
    return;
  }

  // Invencibilidade de 2 segundos após levar dano
  player.invincible = true;
  player.invTimer   = 2000;
}

/* ─────────────────────────────────────────────────────────────────
   SEÇÃO M – PROGRESSÃO DE NÍVEL
   Chamada quando todos os inimigos de um nível são eliminados.
   Exibe a tela de transição, incrementa o nível e gera novos inimigos.
───────────────────────────────────────────────────────────────── */
function levelComplete(now) {
  paused = true;  // pausa o loop de jogo durante a transição

  if (level >= MAX_LEVEL) {
    // Parabéns! Jogador zerou o jogo
    endGame(true);
    return;
  }

  level++;
  updateHUD();

  // Exibe overlay de transição por 2 segundos
  levelTitleEl.textContent = `NÍVEL ${level}`;
  levelSubEl.textContent   = `${enemyCountForLevel(level)} inimigos – Prepare-se!`;
  levelEl.style.display    = 'flex';

  setTimeout(() => {
    levelEl.style.display = 'none';
    playerBullets.length  = 0;  // limpa tiros pendentes
    enemyBullets.length   = 0;
    spawnEnemies(level);         // gera novos inimigos para o nível
    paused = false;              // retoma o loop
  }, 2000);
}

/* ─────────────────────────────────────────────────────────────────
   SEÇÃO N – HUD (ATUALIZAÇÃO DA INTERFACE)
   Atualiza os textos de vidas, pontuação e nível na barra superior.
───────────────────────────────────────────────────────────────── */
function updateHUD() {
  // Corações: ♥ vermelho para cada vida restante, ♡ cinza para perdidas
  hudLivesEl.textContent  = '♥ '.repeat(lives) + '♡ '.repeat(MAX_LIVES - lives);
  hudScoreEl.textContent  = `PONTOS: ${score}`;
  hudLevelEl.textContent  = `NÍVEL: ${level} / ${MAX_LEVEL}`;
}

/* ─────────────────────────────────────────────────────────────────
   SEÇÃO O – FIM DE JOGO
   Exibe o overlay de Game Over (derrota) ou Vitória.
   Salva o recorde se o score atual for maior.
───────────────────────────────────────────────────────────────── */
function endGame(victory) {
  gameRunning = false;
  cancelAnimationFrame(animFrameId);
  saveRecord(score);                      // salva recorde se necessário

  goTitleEl.textContent = victory ? '✦ VOCÊ VENCEU! ✦' : 'GAME OVER';
  goTitleEl.style.color = victory ? '#00ff88' : '#ff4d4d';
  goScoreEl.textContent  = score;
  goRecordEl.textContent = getRecord();
  gameoverEl.style.display = 'flex';
}

/* ─────────────────────────────────────────────────────────────────
   SEÇÃO P – TECLADO
   Registra quais teclas estão pressionadas no momento (keydown/keyup).
   Assim o movimento é suave: verifica a cada frame, não a cada evento.
───────────────────────────────────────────────────────────────── */
const keys = {}; // ex: { 'KeyW': true, 'Space': true }

window.addEventListener('keydown', e => {
  // Ignora repetição automática de tecla pressionada (autorepeat)
  if (e.repeat) return;
  keys[e.code] = true;

  // Tiro com Espaço (chama função de disparo com timestamp atual)
  if (e.code === 'Space' && gameRunning && !paused) {
    e.preventDefault(); // impede scroll da página
    playerShoot(performance.now());
  }

  // M = Voltar ao Menu (mostra confirmação)
  if (e.code === 'KeyM' && gameRunning && confirmEl.style.display !== 'flex') {
    e.preventDefault();
    showConfirm();
  }
});

window.addEventListener('keyup', e => {
  keys[e.code] = false;
});

/* ─────────────────────────────────────────────────────────────────
   SEÇÃO Q – OVERLAY DE CONFIRMAÇÃO (M = Menu)
   Pausa o jogo e exibe um diálogo pedindo confirmação.
   SIM → volta ao menu. NÃO → retoma o jogo.
───────────────────────────────────────────────────────────────── */
function showConfirm() {
  paused = true;
  confirmEl.style.display = 'flex';
}

function hideConfirm() {
  confirmEl.style.display = 'none';
  paused = false;
}

document.getElementById('btn-yes').addEventListener('click', () => {
  hideConfirm();
  goToMenu();
});
document.getElementById('btn-no').addEventListener('click', hideConfirm);

/* ─────────────────────────────────────────────────────────────────
   SEÇÃO R – CONTROLE DE TELAS
   Funções que mostram/escondem as telas principais.
───────────────────────────────────────────────────────────────── */
function showMenu() {
  menuRecordEl.textContent = getRecord();
  menuEl.style.display     = 'flex';
  hudEl.style.display      = 'none';
  gameoverEl.style.display = 'none';
  confirmEl.style.display  = 'none';
  levelEl.style.display    = 'none';
}

function goToMenu() {
  gameRunning = false;
  cancelAnimationFrame(animFrameId);
  showMenu();

  // Continua animando estrelas no menu para efeito visual
  function menuLoop(ts) {
    if (gameRunning) return; // se o jogo reiniciou, para este loop
    const dt = ts - (lastTime || ts);
    lastTime = ts;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    updateStars(dt);
    drawStars();
    animFrameId = requestAnimationFrame(menuLoop);
  }
  animFrameId = requestAnimationFrame(menuLoop);
}

/* ─────────────────────────────────────────────────────────────────
   SEÇÃO S – INICIAR PARTIDA
   Reseta todas as variáveis de estado, esconde o menu,
   exibe o HUD e inicia o loop principal do jogo.
───────────────────────────────────────────────────────────────── */
function startGame() {
  // Reseta estado
  score       = 0;
  lives       = MAX_LIVES;
  level       = 1;
  gameRunning = true;
  paused      = false;
  lastTime    = 0;

  // Limpa arrays de objetos
  playerBullets.length = 0;
  enemyBullets.length  = 0;
  particles.length     = 0;

  resetPlayer();
  initStars();
  spawnEnemies(level);
  updateHUD();

  // Alterna telas
  menuEl.style.display     = 'none';
  gameoverEl.style.display = 'none';
  confirmEl.style.display  = 'none';
  levelEl.style.display    = 'none';
  hudEl.style.display      = 'flex';

  // Cancela qualquer loop anterior e inicia o novo
  cancelAnimationFrame(animFrameId);
  animFrameId = requestAnimationFrame(gameLoop);
}

/* ─────────────────────────────────────────────────────────────────
   SEÇÃO T – LOOP PRINCIPAL DO JOGO (Game Loop)
   O coração do jogo: chamado ~60x por segundo via requestAnimationFrame.
   Calcula o delta time (dt), atualiza toda a lógica e desenha o frame.
───────────────────────────────────────────────────────────────── */
function gameLoop(timestamp) {
  if (!gameRunning) return;

  // Delta time em milissegundos: quanto tempo passou desde o último frame
  const dt = timestamp - (lastTime || timestamp);
  lastTime  = timestamp;

  // ── Atualização (só acontece se não estiver pausado) ──
  if (!paused) {
    updateStars(dt);
    updatePlayer(dt);
    updatePlayerBullets(dt);
    updateEnemies(dt, timestamp);
    updateEnemyBullets(dt, timestamp);
    updateParticles(dt);
    checkBulletEnemyCollisions(timestamp);
  }

  // ── Renderização (sempre acontece, mesmo em pausa) ──
  // 1. Fundo preto
  ctx.fillStyle = '#000008';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 2. Estrelas (fundo animado)
  drawStars();

  // 3. Linha divisória (zona do player)
  ctx.strokeStyle = 'rgba(0,255,136,0.08)';
  ctx.setLineDash([5, 15]);
  ctx.beginPath();
  ctx.moveTo(0, canvas.height - 80);
  ctx.lineTo(canvas.width, canvas.height - 80);
  ctx.stroke();
  ctx.setLineDash([]);

  // 4. Partículas de explosão (atrás das naves)
  drawParticles();

  // 5. Objetos do jogo
  drawEnemies();
  drawPlayerBullets();
  drawEnemyBullets();
  drawPlayer();

  // Solicita o próximo frame
  animFrameId = requestAnimationFrame(gameLoop);
}

/* ─────────────────────────────────────────────────────────────────
   SEÇÃO U – EVENTOS DOS BOTÕES
   Conecta os botões de interface às funções de controle do jogo.
───────────────────────────────────────────────────────────────── */
document.getElementById('btn-play').addEventListener('click', startGame);

// Botões da tela de Game Over
document.getElementById('btn-restart').addEventListener('click', () => {
  gameoverEl.style.display = 'none';
  startGame();
});
document.getElementById('btn-gomenu').addEventListener('click', () => {
  gameoverEl.style.display = 'none';
  goToMenu();
});

/* ─────────────────────────────────────────────────────────────────
   SEÇÃO V – INICIALIZAÇÃO
   Ponto de entrada: prepara as estrelas e exibe o menu principal.
───────────────────────────────────────────────────────────────── */
initStars();
goToMenu(); // começa mostrando o menu com animação de estrelas
</script>
</body>
</html>
